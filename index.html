<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Martin Ferrari</title>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-W2JL66MRHM"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() { dataLayer.push(arguments); }
      gtag('js', new Date());
      gtag('config', 'G-W2JL66MRHM');
    </script>
    <style>
      :root {
        color-scheme: dark;
        --bg: #11131a;
        --panel-border: rgba(255, 255, 255, 0.08);
        --text: #f5f7fb;
        --muted: #b5becf;
        --accent-strong: #4b8df8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, rgba(110, 168, 255, 0.18), transparent 35%),
          linear-gradient(180deg, #0d1016, var(--bg));
        color: var(--text);
      }

      main {
        width: min(100%, 760px);
        padding: 40px;
        border: 1px solid var(--panel-border);
        border-radius: 28px;
        background: rgba(27, 31, 42, 0.92);
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(2.25rem, 4vw, 3.5rem);
        line-height: 1;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 1.05rem;
        line-height: 1.6;
      }

      .links {
        margin-top: 28px;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        padding: 0 18px;
        border-radius: 999px;
        text-decoration: none;
        font-weight: 600;
        transition: background-color 160ms ease, transform 160ms ease;
      }

      a.primary {
        background: var(--accent-strong);
        color: white;
      }

      a.secondary {
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
        border: 1px solid var(--panel-border);
      }

      a:hover {
        transform: translateY(-1px);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Martin Ferrari</h1>
      <p>
        Personal site placeholder. This page will gradually collect public projects,
        links, and experiments.
      </p>
      <div class="links">
        <a class="primary" href="https://github.com/dmferrari">GitHub profile</a>
        <a class="secondary" href="https://github.com/dmferrari/email-addresses-generator">Test Email Addresses</a>
      </div>
    </main>
  </body>
</html>
